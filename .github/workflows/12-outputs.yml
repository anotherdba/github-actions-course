name: 12 - working with outputs
on:
  workflow_dispatch:
    inputs:
      build-status:
        type: choice
        options:
          - success
          - failure
        default: success

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Print GITHUB_OUTPUT path
        run: echo " $GITHUB_OUTPUT"

      - id: build
        run: |
          echo: "status=success" >> "${{ GITHUB_OUTPUT }}"




