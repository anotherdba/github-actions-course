name: 03- Workflow Runners

on: workflow_dispatch

jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
    - name: Show OS
      run: |
        echo "This job is running on $runner_OS"


  Windows-echo:
    runs-on: windows-latest
    steps:
    - name: Show OS
      run: |
        echo "This job is running on $runner_OS"



  Macos-echo:
    runs-on: macos-latest
    steps:
    - name: Show OS
      run: |
        echo "This job is running on r$unner_OS"
